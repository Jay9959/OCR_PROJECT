<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM OCR | Core Dashboard</title>
    <meta name="description"
        content="Auto Image Rotation Dashboard — Process PDFs, detect rotation, separate blank pages, and build output PDFs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=2.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%2306b6d4'/><stop offset='100%' stop-color='%238b5cf6'/></linearGradient></defs><rect x='10' y='10' width='80' height='80' rx='20' fill='none' stroke='url(%23g)' stroke-width='10'/><path d='M25 50 L75 50' stroke='%23ec4899' stroke-width='8' stroke-linecap='round'/><circle cx='50' cy='50' r='12' fill='%2306b6d4'/></svg>">
</head>

<body>
    <!-- Background removed as per user request -->

    <!-- ═══ Loader Overlay ═══ -->
    <div class="loader-overlay" id="loader">
        <div class="loader-reactor">
            <div class="reactor-ring outer"></div>
            <div class="reactor-ring middle"></div>
            <div class="reactor-ring inner"></div>
            <div class="reactor-core">
                <span id="loader-percentage">0%</span>
            </div>
        </div>
        <div class="loader-text">INITIALIZING QUANTUM OCR ENGINE...</div>
        <div class="loader-bar-container">
            <div class="loader-bar-glow" id="loaderFill"></div>
        </div>
    </div>

    <!-- ═══ Top Navigation Bar ═══ -->
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12a9 9 0 11-6.22-8.56" />
                    <path d="M21 3v5h-5" />
                </svg>
            </div>
            <div class="brand-text">
                <span class="brand-name">OCR Engine</span>
                <span class="brand-version">v10.2</span>
            </div>
        </div>
        <div class="nav-status">
            <div class="status-pill" id="statusPill">
                <span class="status-dot"></span>
                <span class="status-text">Idle</span>
            </div>
            <div class="nav-timer" id="navTimer">00:00</div>
        </div>
    </nav>

    <!-- ═══ Main Dashboard ═══ -->
    <main class="dashboard">
        <!-- ─── Stats Row ─── -->
        <section class="stats-row" id="statsRow">
            <div class="stat-card" id="statInputPdfs">
                <div class="stat-icon input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-value" id="inputPdfCount">0</span>
                    <span class="stat-label">Input PDFs</span>
                </div>
            </div>
            <div class="stat-card" id="statConvertedPages">
                <div class="stat-icon convert-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-value" id="convertedPageCount">0</span>
                    <span class="stat-label">Converted Pages</span>
                </div>
            </div>
            <div class="stat-card" id="statOutputImages">
                <div class="stat-icon output-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-value" id="outputImageCount">0</span>
                    <span class="stat-label">Processed Images</span>
                </div>
            </div>
            <div class="stat-card" id="statBlankPages">
                <div class="stat-icon blank-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-value" id="blankPageCount">0</span>
                    <span class="stat-label">Blank Pages</span>
                </div>
            </div>
            <div class="stat-card" id="statOutputPdfs">
                <div class="stat-icon pdf-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-value" id="outputPdfCount">0</span>
                    <span class="stat-label">Output PDFs</span>
                </div>
            </div>
        </section>

        <!-- ─── Main Grid ─── -->
        <div class="main-grid">
            <!-- LEFT PANEL: Controls + Config -->
            <aside class="panel panel-left">
                <!-- Control Card -->
                <div class="card control-card">
                    <div class="card-header">
                        <h2 class="card-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                class="title-icon">
                                <polygon points="5 3 19 12 5 21 5 3" />
                            </svg>
                            Process Control
                        </h2>
                    </div>
                    <div class="card-body">
                        <div class="upload-system">
                            <div class="upload-controls">
                                <label class="upload-box" id="uploadBox">
                                    <input type="file" id="fileInput" multiple hidden>
                                    <input type="file" id="folderInput" webkitdirectory directory multiple hidden>
                                    <div class="upload-content">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="upload-icon">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                            <polyline points="17 8 12 3 7 8" />
                                            <line x1="12" y1="3" x2="12" y2="15" />
                                        </svg>
                                        <span class="upload-text">Select Files or Folder</span>
                                        <span class="upload-hint">Drag & drop also works</span>
                                    </div>
                                </label>
                                <div class="upload-actions">
                                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('fileInput').click()">
                                        Choose PDF/Images
                                    </button>
                                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('folderInput').click()">
                                        Choose Folder
                                    </button>
                                </div>
                                <div class="selected-files-info" id="selectedFilesInfo" style="display:none;">
                                    <span id="fileCountText">0 files selected</span>
                                    <button class="btn btn-primary btn-upload" id="btnUpload" onclick="uploadFiles()">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                            <polyline points="17 8 12 3 7 8" />
                                            <line x1="12" y1="3" x2="12" y2="15" />
                                        </svg>
                                        <span>Upload & Start</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="control-buttons">
                            <button class="btn btn-primary btn-convert" id="btnConvert"
                                onclick="startProcess('convert')" disabled>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                </svg>
                                <span>PDF → Images</span>
                            </button>
                            <button class="btn btn-primary btn-rotate" id="btnRotate" onclick="startProcess('rotate')" disabled>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 12a9 9 0 11-6.22-8.56" />
                                    <path d="M21 3v5h-5" />
                                </svg>
                                <span>Auto Rotate</span>
                            </button>
                            <button class="btn btn-success btn-download" id="btnDownload" onclick="downloadResult()" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                <span>Download Result</span>
                            </button>
                            <button class="btn btn-danger" id="btnStop" onclick="stopProcess()" disabled>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="6" y="6" width="12" height="12" rx="1" />
                                </svg>
                                <span>Stop</span>
                            </button>
                        </div>

                        <!-- Progress Section -->
                        <div class="progress-section" id="progressSection" style="display:none;">
                            <div class="progress-header">
                                <span class="progress-label" id="progressLabel">Processing...</span>
                                <span class="progress-percent" id="progressPercent">0%</span>
                            </div>
                            <div class="progress-bar-track">
                                <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
                                <div class="progress-bar-glow"></div>
                            </div>
                            <div class="progress-detail" id="progressDetail"></div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions Card -->
                <div class="card actions-card">
                    <div class="card-header">
                        <h2 class="card-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                class="title-icon">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                            </svg>
                            Quick Actions
                        </h2>
                    </div>
                    <div class="card-body">
                        <div class="action-buttons" id="actionButtons">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </aside>

            <!-- RIGHT PANEL: Terminal -->
            <section class="panel panel-right">
                <div class="card terminal-card">
                    <div class="card-header terminal-header">
                        <div class="terminal-title-row">
                            <h2 class="card-title">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    class="title-icon">
                                    <polyline points="4 17 10 11 4 5" />
                                    <line x1="12" y1="19" x2="20" y2="19" />
                                </svg>
                                Terminal Output
                            </h2>
                            <div class="terminal-badges">
                                <span class="line-count-badge" id="lineCountBadge">0 lines</span>
                            </div>
                        </div>
                        <div class="terminal-actions">
                            <button class="btn-icon btn-icon-sm" onclick="toggleAutoScroll()" id="btnAutoScroll"
                                title="Auto-scroll">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="7 13 12 18 17 13" />
                                    <polyline points="7 6 12 11 17 6" />
                                </svg>
                            </button>
                            <button class="btn-icon btn-icon-sm" onclick="clearLogs()" title="Clear logs">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6" />
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="terminal-body" id="terminalBody">
                        <div class="terminal-content" id="terminalContent">
                            <div class="terminal-welcome">
                                <div class="welcome-art" id="welcomeArt"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- ═══ Toast Notification ═══ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ═══ Custom Cursor ═══ -->
    <div class="cursor" id="cursor"></div>

    <script src="/app.js?v=2.0"></script>
</body>

</html>
